name: CI

# 型チェックとスキーマ検証をCIで実施する。
# ローカル(非ASCIIパス)ではprisma/tscがクラッシュするため、
# 変更を本番デプロイする前にこのCIで型エラー・スキーマ不整合を検知する。
# ※Vercelのデプロイとは独立（このCIが赤でもデプロイは実行される）。

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    # prisma validate/generate は env() の解決にのみ使う（DB接続はしない）。
    # ダミー値で十分。
    env:
      DATABASE_URL: "postgresql://user:pass@localhost:5432/db?schema=public"
      DIRECT_URL: "postgresql://user:pass@localhost:5432/db?schema=public"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Prisma schema
        run: pnpm exec prisma validate

      - name: Generate Prisma Client
        run: pnpm exec prisma generate

      - name: Type check
        run: pnpm exec tsc --noEmit
